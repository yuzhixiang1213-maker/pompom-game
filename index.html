<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>布丁狗大胃王：难度控制台版 🍮</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body { margin: 0; background: #fffcf0; overflow: hidden; font-family: sans-serif; user-select: none; }
        
        #control-panel {
            position: absolute; top: 25px; left: 25px; z-index: 100; visibility: hidden;
            background: #ffffff; border: 4px solid #5a3d28; padding: 15px; border-radius: 16px;
            box-shadow: 0 6px 0 #5a3d28; display: flex; flex-direction: column; gap: 15px; width: 220px;
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { font-size: 12px; color: #5a3d28; font-weight: bold; display: flex; justify-content: space-between; }
        
        #game-ui { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 15; visibility: hidden; }
        .ui-card { background: #ffffff; border: 4px solid #5a3d28; padding: 8px 20px; border-radius: 14px; box-shadow: 0 5px 0 #5a3d28; text-align: center; min-width: 85px; }
        
        #camera-wrapper { position: absolute; right: 25px; top: 25px; z-index: 10; visibility: hidden; border: 4px solid #5a3d28; border-radius: 20px; overflow: hidden; }
        #webcam { width: 150px; height: 110px; object-fit: cover; transform: scaleX(-1); display: block; }
        
        #pompompurin-container { position: absolute; bottom: 3%; left: 50%; transform: translateX(-50%); z-index: 5; visibility: hidden; }
        #dog-img { width: 260px; height: auto; mix-blend-mode: multiply; }

        #conveyor-belt { position: absolute; top: 230px; left: 0; width: 100%; height: 130px; z-index: 6; visibility: hidden; background: #f7ebd3; border-top: 6px solid #5a3d28; border-bottom: 6px solid #5a3d28; }
        .scrolling-food { position: absolute; font-size: 45px; cursor: pointer; width: 75px; height: 75px; background: #ffffff; border: 3px solid #5a3d28; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 0 #5a3d28; }

        .aiming-food-node { position: absolute; font-size: 55px; display: none; pointer-events: none; z-index: 100; }
        .aim-line-svg { position: absolute; pointer-events: none; z-index: 98; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .hand-pointer { position: absolute; font-size: 42px; pointer-events: none; z-index: 99; display: none; }
    </style>
</head>
<body>

    <div id="control-panel">
        <div class="control-group">
            <label>🍣 寿司速度: <span id="s-val">2.5</span></label>
            <input type="range" id="s-slide" min="1" max="8" step="0.5" value="2.5" oninput="updateConfig()">
        </div>
        <div class="control-group">
            <label>📦 间距: <span id="p-val">180px</span></label>
            <input type="range" id="p-slide" min="100" max="350" step="10" value="180" oninput="updateConfig()">
        </div>
        <div class="control-group">
            <label>🐕 狗狗速度: <span id="d-val">3.2</span></label>
            <input type="range" id="d-slide" min="1" max="10" step="0.2" value="3.2" oninput="updateConfig()">
        </div>
    </div>

    <div id="game-ui">
        <div class="ui-card"><div class="ui-value" id="time-val">180</div></div>
        <div class="ui-card"><div class="ui-value" id="score-val">0</div></div>
    </div>
    
    <div id="camera-wrapper"><video id="webcam" autoplay playsinline></video></div>
    <div id="conveyor-belt"><div id="belt-track"></div></div>
    <div id="pompompurin-container"><img src="dog.png" id="dog-img"></div>
    
    <script>
        // 游戏全局变量
        let config = { speed: 2.5, spacing: 180, dogSpeed: 3.2 };
        let activeFoods = [];

        function updateConfig() {
            config.speed = parseFloat(document.getElementById('s-slide').value);
            config.spacing = parseInt(document.getElementById('p-slide').value);
            config.dogSpeed = parseFloat(document.getElementById('d-slide').value);
            
            document.getElementById('s-val').innerText = config.speed;
            document.getElementById('p-val').innerText = config.spacing + 'px';
            document.getElementById('d-val').innerText = config.dogSpeed;
            
            activeFoods.forEach(f => f.speed = config.speed + (f.topY === 10 ? 0.6 : 0));
        }

        // 剩下的游戏逻辑保持不变，确保 startGameNow() 调用时显示 control-panel
        function startGameNow() {
            document.getElementById('control-panel').style.visibility = 'visible';
            document.getElementById('game-ui').style.visibility = 'visible';
            document.getElementById('camera-wrapper').style.visibility = 'visible';
            document.getElementById('conveyor-belt').style.visibility = 'visible';
            document.getElementById('pompompurin-container').style.visibility = 'visible';
            // ...启动逻辑
        }
        
        // 此处省略其他逻辑，逻辑与之前版本完全兼容，仅需替换上面的配置部分
    </script>
</body>
</html>
