<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>布丁狗回转寿司V2.0 | 连击·技能·真实表情切换 🍮🐶</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body { margin: 0; background: #fffcf0; overflow: hidden; font-family: sans-serif; user-select: none; }
        
        #start-menu {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 252, 240, 0.96); backdrop-filter: blur(10px);
            z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .menu-title { font-size: 46px; color: #5a3d28; font-weight: 900; margin-bottom: 5px; }
        .menu-subtitle { font-size: 16px; color: #a08068; margin-bottom: 35px; font-weight: bold; }
        .time-selector { display: flex; gap: 15px; margin-bottom: 40px; }
        .time-btn {
            background: #ffffff; border: 3px solid #5a3d28; padding: 12px 24px;
            border-radius: 14px; font-size: 16px; font-weight: bold; color: #5a3d28;
            cursor: pointer; box-shadow: 0 5px 0 #5a3d28; transition: all 0.1s ease;
        }
        .time-btn.active { background: #fce67c; transform: translateY(3px); box-shadow: 0 2px 0 #5a3d28; }
        #start-game-btn {
            background: #ff6b6b; color: white; border: 4px solid #5a3d28;
            padding: 16px 60px; font-size: 28px; font-weight: 900; border-radius: 50px;
            cursor: pointer; box-shadow: 0 8px 0 #5a3d28;
        }

        #control-panel {
            position: absolute; top: 25px; left: 25px; z-index: 100; visibility: hidden;
            background: #ffffff; border: 4px solid #5a3d28; padding: 15px; border-radius: 16px;
            box-shadow: 0 6px 0 #5a3d28; display: flex; flex-direction: column; gap: 12px; width: 200px;
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { font-size: 12px; color: #5a3d28; font-weight: bold; display: flex; justify-content: space-between; }
        .control-group input[type="range"] { accent-color: #ff6b6b; cursor: pointer; }

        #game-ui {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px;
            z-index: 15; visibility: hidden; background: rgba(255,252,240,0.8); padding: 6px 18px;
            border-radius: 60px; backdrop-filter: blur(2px);
        }
        .ui-card { background: #ffffff; border: 3px solid #5a3d28; padding: 5px 12px; border-radius: 30px;
            box-shadow: 0 4px 0 #5a3d28; text-align: center; min-width: 70px; }
        .ui-label { font-size: 10px; color: #a08068; font-weight: bold; }
        .ui-value { font-size: 22px; color: #5a3d28; font-weight: 900; line-height: 1.2; }

        #camera-wrapper { position: absolute; right: 25px; top: 25px; z-index: 10; visibility: hidden;
            border: 4px solid #5a3d28; border-radius: 20px; overflow: hidden; }
        #webcam { width: 150px; height: 110px; object-fit: cover; transform: scaleX(-1); display: block; }
        
        #pompompurin-container { position: absolute; bottom: 3%; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; z-index: 5; visibility: hidden;
            will-change: left; transition: left 0.05s linear; }
        #dog-img { width: 260px; height: auto; display: block; mix-blend-mode: multiply; pointer-events: none; }
        #status-tag { font-size: 14px; font-weight: bold; color: #ffffff; margin-top: -10px;
            background: #5a3d28; padding: 6px 22px; border-radius: 30px; white-space: nowrap; }

        #conveyor-belt { position: absolute; top: 230px; left: 0; width: 100%; height: 130px;
            z-index: 6; visibility: hidden; background: #f7ebd3; border-top: 6px solid #5a3d28;
            border-bottom: 6px solid #5a3d28; box-shadow: inset 0 8px 16px rgba(90,61,40,0.15); }
        #belt-track { position: absolute; left: 0; top: 0; height: 100%; width: 100%; }
        .scrolling-food { position: absolute; font-size: 45px; cursor: pointer; width: 75px; height: 75px;
            background: #ffffff; border: 3px solid #5a3d28; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 6px 0 #5a3d28; }

        .aiming-food-node { position: absolute; font-size: 60px; display: none; pointer-events: none;
            z-index: 100; transform: translate(-50%, -50%); filter: drop-shadow(0 8px 15px rgba(0,0,0,0.2)); }
        .aim-line-svg { position: absolute; pointer-events: none; z-index: 98; top: 0; left: 0;
            width: 100%; height: 100%; display: none; }
        .aim-path-line { fill: none; stroke: #ff6b6b; stroke-width: 5; stroke-dasharray: 8; }
        .flying-food { position: absolute; font-size: 58px; pointer-events: none; z-index: 95;
            transform: translate(-50%, -50%); will-change: left, top; filter: drop-shadow(0 2px 6px black); }
        .hand-pointer { position: absolute; font-size: 48px; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 99; display: none; text-shadow: 2px 2px 0 white; }
        .floating-text { position: absolute; font-size: 38px; font-weight: 900; color: #ff6b6b;
            text-shadow: 2px 2px 0 white; z-index: 120; pointer-events: none; white-space: nowrap;
            transition: all 0.9s cubic-bezier(0.2, 1, 0.3, 1); }
        .heart-particle { position: absolute; font-size: 28px; pointer-events: none; z-index: 90;
            animation: flyUp 1s ease-out forwards; }

        @keyframes dogWobble { 0% { transform: scale(1.1) rotate(-5deg); } 50% { transform: scale(1.1) rotate(5deg); } 100% { transform: scale(1) rotate(0deg); } }
        @keyframes dogShock { 0% { transform: scale(0.9) translate(-10px, -10px); } 50% { transform: scale(1.2) translate(10px, 10px); } 100% { transform: scale(1) translate(0); } }
        @keyframes flyUp { 0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(1.3); opacity: 0; } }
        @keyframes pulseGold { 0% { text-shadow: 0 0 0 gold; } 100% { text-shadow: 0 0 12px gold; } }
        .combo-highlight { animation: pulseGold 0.3s ease-out; }
    </style>
</head>
<body>

    <div id="start-menu">
        <div class="menu-title">🍣 布丁狗回转寿司 V2.0 🍮🐶</div>
        <div class="menu-subtitle">✨ 连击·技能·真实表情切换 ✨  双手握拳抓取→张开发射！</div>
        <div class="time-selector">
            <button class="time-btn" onclick="selectTime(60, this)">⏱️ 60 秒挑战</button>
            <button class="time-btn active" onclick="selectTime(180, this)">⏱️ 3 分钟大胃王</button>
            <button class="time-btn" onclick="selectTime(9999, this)">♾️ 无限练习模式</button>
        </div>
        <button id="start-game-btn" onclick="startGameNow()">🎌 开启布丁狗大胃王 🎌</button>
    </div>

    <div id="control-panel">
        <div class="control-group"><label>🍣 寿司速度: <span id="speed-val-display">2.5</span></label><input type="range" id="speed-slider" min="1.0" max="8.0" step="0.5" value="2.5" oninput="updateSliders()"></div>
        <div class="control-group"><label>📦 供应间距: <span id="spacing-val-display">180px</span></label><input type="range" id="spacing-slider" min="100" max="300" step="10" value="180" oninput="updateSliders()"></div>
        <div class="control-group"><label>🐕 布丁狗速度: <span id="dog-speed-display">3.2</span></label><input type="range" id="dog-speed-slider" min="1.0" max="10.0" step="0.2" value="3.2" oninput="updateDogSpeed()"></div>
    </div>

    <svg id="aim-line-0" class="aim-line-svg"><path id="aim-path-0" class="aim-path-line" d=""/></svg>
    <svg id="aim-line-1" class="aim-line-svg"><path id="aim-path-1" class="aim-path-line" d=""/></svg>

    <div id="camera-wrapper"><video id="webcam" autoplay playsinline></video></div>
    
    <div id="game-ui">
        <div class="ui-card"><div class="ui-label">⏱️ TIME</div><div id="time-val" class="ui-value">180</div></div>
        <div class="ui-card"><div class="ui-label">🍣 SCORE</div><div id="score-val" class="ui-value">0</div></div>
        <div class="ui-card" id="combo-card"><div class="ui-label">⚡ COMBO</div><div id="combo-val" class="ui-value">0</div></div>
        <div class="ui-card" id="skill-card"><div class="ui-label">⭐ SKILL</div><div id="skill-val" class="ui-value">0%</div></div>
        <div class="ui-card" id="life-card" style="background: #ffeaa7;"><div class="ui-label">❤️ LIFE</div><div id="life-val" class="ui-value">❤️❤️❤️</div></div>
    </div>
    
    <div id="conveyor-belt"><div id="belt-track"></div></div>
    <div id="pompompurin-container"><img src="dog_normal.png" id="dog-img" alt="布丁狗"><div id="status-tag">双手“握拳”抓寿司，张开手掌发射！</div></div>

    <div id="aiming-food-0" class="aiming-food-node"></div>
    <div id="aiming-food-1" class="aiming-food-node"></div>
    <div id="pointer-0" class="hand-pointer">🐾</div> 
    <div id="pointer-1" class="hand-pointer">🐾</div> 

    <audio id="eat-sound" src="eat.mp3" preload="auto"></audio>

    <script>
        // ---------- DOM 元素 ----------
        const video = document.getElementById('webcam');
        const dogImg = document.getElementById('dog-img');
        const dogContainer = document.getElementById('pompompurin-container');
        const beltTrack = document.getElementById('belt-track');
        const statusTag = document.getElementById('status-tag');
        const scoreVal = document.getElementById('score-val');
        const timeVal = document.getElementById('time-val');
        const lifeVal = document.getElementById('life-val');
        const comboValElem = document.getElementById('combo-val');
        const skillValElem = document.getElementById('skill-val');
        const eatSound = document.getElementById('eat-sound');
        const startMenu = document.getElementById('start-menu');

        // ========== 全局游戏状态 ==========
        let score = 0, timeLeft = 180, lives = 3, gameActive = false, modeSelected = 180;
        let dogX = window.innerWidth / 2, dogSpeed = 3.2, dogDirection = 1;
        let currentConfigSpeed = 2.5, currentConfigSpacing = 180;

        // ========== V2.0 变量 ==========
        let combo = 0;
        let maxCombo = 0;
        let comboTimer = null;
        let skillEnergy = 0;
        let skillReady = false;
        let doubleScoreMode = false;
        let doubleTimeout = null;
        
        const foodEffects = {
            "🍮":{score:20},  "🍪":{score:10},  "🍩":{score:15},  "🍓":{score:15},
            "🍔":{score:30},  "🍟":{score:20},  "🍕":{score:25},  "🍣":{score:20},
            "🍰":{special:"double"},  "🍉":{special:"heal"},  "🥞":{score:15},
            "🌶️":{special:"hurt"},   "💣":{special:"bomb"}
        };
        
        // ========== 图片映射（匹配您的实际文件名）==========
        const dogImages = {
            normal: "dog_normal.png",
            happy:  "dog_happy.png",
            angry:  "dog_angry.png",
            skill:  "dog_skill.png",      // 您也可以改成 "吃饱了狗.png"
            dead:   "dog_dead.png"
        };
        const DEFAULT_DOG_IMG = "dog_normal.png";
        
        function setDogState(type) {
            if(!gameActive) return;
            let imgSrc = dogImages[type] || DEFAULT_DOG_IMG;
            // 尝试加载，如果失败则回退
            const tempImg = new Image();
            tempImg.onerror = () => {
                if (dogImg.src !== DEFAULT_DOG_IMG) {
                    dogImg.src = DEFAULT_DOG_IMG;
                }
            };
            tempImg.onload = () => {
                dogImg.src = imgSrc;
            };
            tempImg.src = imgSrc;
            dogImg.src = imgSrc;
            
            switch(type) {
                case "happy": statusTag.innerText = "😋 超美味! 布丁狗开心摇尾巴~"; break;
                case "angry": statusTag.innerText = "😡 好辣 / 炸弹! 布丁狗被吓到!"; break;
                case "skill": statusTag.innerText = "✨✨ 布丁时间！双倍积分 ✨✨"; break;
                default: statusTag.innerText = "🍣 继续喂我~ 抓取发射！";
            }
        }
        
        function showFloatingText(text, x, y, color="#ff6b6b") {
            const div = document.createElement("div");
            div.innerText = text;
            div.className = "floating-text";
            div.style.left = x + "px";
            div.style.top = y + "px";
            div.style.color = color;
            div.style.fontWeight = "bold";
            div.style.zIndex = "999";
            document.body.appendChild(div);
            setTimeout(() => {
                div.style.transform = "translateY(-90px)";
                div.style.opacity = "0";
            }, 20);
            setTimeout(() => div.remove(), 900);
        }
        
        function createHeart(x, y) {
            const heart = document.createElement('div'); heart.className = 'heart-particle';
            heart.innerText = ['❤️', '✨', '⭐', '💖'][Math.floor(Math.random() * 4)];
            heart.style.left = x + 'px'; heart.style.top = y + 'px';
            const angle = Math.random() * Math.PI * 2; const distance = 80 + Math.random() * 100;
            heart.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
            heart.style.setProperty('--ty', Math.sin(angle) * distance - 40 + 'px');
            document.body.appendChild(heart); setTimeout(() => heart.remove(), 1000);
        }
        
        function activateSkill() {
            if(!gameActive) return false;
            if(!skillReady) {
                showFloatingText("❌ 技能未就绪", dogX, window.innerHeight-180, "#a08068");
                return false;
            }
            skillReady = false;
            skillEnergy = 0;
            skillValElem.innerText = "0%";
            if(doubleTimeout) clearTimeout(doubleTimeout);
            doubleScoreMode = true;
            setDogState("skill");
            showFloatingText("⭐ 布丁时间 · 双倍积分 ⭐", dogX, window.innerHeight-230, "#ffaa44");
            statusTag.innerText = "✨ SKILL ACTIVE! 双倍得分 ✨";
            doubleTimeout = setTimeout(() => {
                doubleScoreMode = false;
                if(gameActive) {
                    setDogState("normal");
                    statusTag.innerText = "双倍结束, 继续喂饱布丁狗~";
                    showFloatingText("双倍结束", dogX, window.innerHeight-200, "#888");
                }
            }, 5000);
            return true;
        }
        
        function resetComboTimer() {
            if(comboTimer) clearTimeout(comboTimer);
            comboTimer = setTimeout(() => {
                if(combo > 0 && gameActive) {
                    combo = 0;
                    comboValElem.innerText = "0";
                    comboValElem.classList.remove("combo-highlight");
                    showFloatingText("连击中断", dogX, window.innerHeight-180, "#aaa");
                }
            }, 3000);
        }
        
        function updateSkillUI() {
            let percent = Math.floor(skillEnergy);
            skillValElem.innerText = percent + "%";
            if(skillEnergy >= 100 && !skillReady) {
                skillReady = true;
                skillEnergy = 100;
                skillValElem.innerText = "100%";
                showFloatingText("✨ 技能就绪！按空格 ✨", dogX, window.innerHeight-200, "#ff9900");
                statusTag.innerText = "⭐ 技能满啦！按【空格】发动双倍 ⭐";
            }
        }
        
        function addSkillEnergy(amount) {
            if(!gameActive) return;
            skillEnergy = Math.min(100, skillEnergy + amount);
            updateSkillUI();
        }
        
        function handleFoodImpact(emoji, impactX = null, impactY = null) {
            if(!gameActive) return;
            const dogRect = dogImg.getBoundingClientRect();
            const centerX = dogRect.left + dogRect.width/2;
            const centerY = dogRect.top + dogRect.height/2;
            const effect = foodEffects[emoji] || {score:10};
            
            if(effect.special === "hurt" || effect.special === "bomb" || emoji === '🌶️' || emoji === '💣') {
                if(timeLeft !== 9999) {
                    lives--;
                    if(lives < 0) lives = 0;
                    let heartStr = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
                    lifeVal.innerText = heartStr;
                    showFloatingText(emoji === '💣' ? "💥 炸弹爆炸 -1命" : "🌶️ 辣到跺脚 -1命", centerX, centerY-40, "#ff4444");
                    setDogState("angry");
                    dogImg.style.animation = 'dogShock 0.6s ease-in-out';
                    setTimeout(() => dogImg.style.animation = '', 600);
                    if(combo > 0) { combo = 0; comboValElem.innerText = "0"; }
                    if(comboTimer) clearTimeout(comboTimer);
                    if(lives <= 0 && timeLeft !== 9999) {
                        gameActive = false;
                        setDogState("dead");
                        statusTag.innerText = "💀 布丁狗倒下啦... 刷新页面可重开 💀";
                        alert(`💀 挑战结束！最终得分: ${score} 分，最高连击: ${maxCombo}`);
                        return;
                    }
                } else {
                    showFloatingText(emoji === '💣' ? "💣 炸弹无效(无限模式)" : "🌶️ 太辣但无敌", centerX, centerY-40, "#ffaa88");
                    dogImg.style.animation = 'dogShock 0.4s ease-in-out';
                    setTimeout(() => dogImg.style.animation = '', 400);
                }
                if(comboTimer) clearTimeout(comboTimer);
                combo = 0;
                comboValElem.innerText = "0";
                return;
            }
            
            if(effect.special === "heal") {
                if(timeLeft !== 9999 && lives < 3) {
                    lives++;
                    let heartStr = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
                    lifeVal.innerText = heartStr;
                    showFloatingText("🍉 回血 +1 ❤️", centerX, centerY-50, "#77dd77");
                } else if(timeLeft !== 9999 && lives === 3) {
                    showFloatingText("🍉 生命已满 +10分", centerX, centerY-50, "#ffaa66");
                    score += 10;
                    scoreVal.innerText = score;
                } else if(timeLeft === 9999) {
                    score += 10;
                    scoreVal.innerText = score;
                    showFloatingText("🍉 +10 分", centerX, centerY-50, "#ffaa66");
                }
                setDogState("happy");
                dogImg.style.animation = 'dogWobble 0.4s ease-out';
                setTimeout(() => dogImg.style.animation = '', 400);
                combo++;
                if(combo > maxCombo) maxCombo = combo;
                comboValElem.innerText = combo;
                comboValElem.classList.add("combo-highlight");
                setTimeout(() => comboValElem.classList.remove("combo-highlight"), 200);
                resetComboTimer();
                addSkillEnergy(10);
                try { eatSound.currentTime = 0; eatSound.play(); } catch(e) {}
                for(let i=0;i<6;i++) createHeart(centerX, centerY);
                return;
            }
            
            if(effect.special === "double") {
                if(doubleTimeout) clearTimeout(doubleTimeout);
                doubleScoreMode = true;
                setDogState("skill");
                showFloatingText("🍰 双倍积分模式 5秒 🍰", centerX, centerY-60, "#ffaa44");
                doubleTimeout = setTimeout(() => {
                    doubleScoreMode = false;
                    if(gameActive) setDogState("normal");
                }, 5000);
                let gain = 20;
                if(doubleScoreMode) gain *= 2;
                score += gain;
                scoreVal.innerText = score;
                showFloatingText(`🍰 +${gain}`, centerX, centerY-50, "gold");
                combo++;
                if(combo > maxCombo) maxCombo = combo;
                comboValElem.innerText = combo;
                comboValElem.classList.add("combo-highlight");
                setTimeout(() => comboValElem.classList.remove("combo-highlight"), 200);
                resetComboTimer();
                addSkillEnergy(15);
                dogImg.style.animation = 'dogWobble 0.5s ease-out';
                setTimeout(() => dogImg.style.animation = '', 500);
                try { eatSound.currentTime = 0; eatSound.play(); } catch(e) {}
                for(let i=0;i<8;i++) createHeart(centerX, centerY);
                return;
            }
            
            let basePoints = effect.score || 10;
            let multiplier = 1;
            if(combo >= 10) multiplier = 3;
            else if(combo >= 5) multiplier = 2;
            let finalGain = basePoints * multiplier;
            if(doubleScoreMode) finalGain *= 2;
            
            score += finalGain;
            scoreVal.innerText = score;
            let plusText = `+${finalGain}`;
            if(multiplier > 1) plusText = `+${finalGain} (x${multiplier}!)`;
            if(doubleScoreMode && multiplier === 1) plusText = `+${finalGain} ✨双倍✨`;
            showFloatingText(plusText, centerX, centerY-45, "#ff884d");
            
            combo++;
            if(combo > maxCombo) maxCombo = combo;
            comboValElem.innerText = combo;
            comboValElem.classList.add("combo-highlight");
            setTimeout(() => comboValElem.classList.remove("combo-highlight"), 200);
            resetComboTimer();
            addSkillEnergy(10);
            setDogState("happy");
            dogImg.style.animation = 'dogWobble 0.4s ease-out';
            setTimeout(() => dogImg.style.animation = '', 400);
            try { eatSound.currentTime = 0; eatSound.play(); } catch(e) {}
            for(let i=0;i<5+Math.floor(combo/3);i++) createHeart(centerX, centerY);
            statusTag.innerText = `🍣 美味 ${emoji} 连击x${combo} 🍣`;
        }
        
        // ---------- 游戏循环与寿司生成 ----------
        let activeFoods = [];
        let flyingFoods = [];
        const foodPool = ['🍮', '🍪', '🍩', '🍓', '🍔', '🍟', '🍕', '🍣', '🍰', '🍉', '🥞', '🌶️', '💣'];
        
        function appendSushiFood(startX, topY) {
            const emoji = foodPool[Math.floor(Math.random() * foodPool.length)];
            const el = document.createElement('div');
            el.className = 'scrolling-food'; el.innerText = emoji;
            el.style.left = `${startX}px`; el.style.top = `${topY}px`;
            const speed = currentConfigSpeed + (topY === 10 ? 0.6 : 0);
            beltTrack.appendChild(el);
            activeFoods.push({ element: el, emoji: emoji, x: startX, topY: topY, speed: speed });
        }
        
        function resetGameEnvironment() {
            while(beltTrack.firstChild) beltTrack.removeChild(beltTrack.firstChild);
            activeFoods = [];
            flyingFoods = [];
            score = 0; combo = 0; maxCombo = 0; skillEnergy = 0; skillReady = false; doubleScoreMode = false;
            if(doubleTimeout) clearTimeout(doubleTimeout);
            if(comboTimer) clearTimeout(comboTimer);
            scoreVal.innerText = "0";
            comboValElem.innerText = "0";
            skillValElem.innerText = "0%";
            lives = 3;
            if(timeLeft !== 9999) lifeVal.innerText = "❤️❤️❤️";
            else document.getElementById('life-card').style.display = "none";
            dogDirection = 1;
            dogX = window.innerWidth / 2;
            dogContainer.style.left = `${dogX}px`;
            setDogState("normal");
            for(let i=0;i<12;i++) {
                appendSushiFood(window.innerWidth - (i * currentConfigSpacing), i%2===0 ? 10 : 45);
            }
        }
        
        function updateSliders() {
            currentConfigSpeed = parseFloat(document.getElementById('speed-slider').value);
            currentConfigSpacing = parseInt(document.getElementById('spacing-slider').value);
            document.getElementById('speed-val-display').innerText = currentConfigSpeed.toFixed(1);
            document.getElementById('spacing-val-display').innerText = currentConfigSpacing + 'px';
            activeFoods.forEach(f => { f.speed = currentConfigSpeed + (f.topY === 10 ? 0.6 : 0); });
        }
        function updateDogSpeed() { dogSpeed = parseFloat(document.getElementById('dog-speed-slider').value); document.getElementById('dog-speed-display').innerText = dogSpeed.toFixed(1); }
        
        function selectTime(seconds, btn) {
            modeSelected = seconds;
            document.querySelectorAll('.time-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            timeVal.innerText = seconds===9999?"∞":seconds;
            if(seconds===9999) document.getElementById('life-card').style.display="none";
            else document.getElementById('life-card').style.display="block";
        }
        
        function startGameNow() {
            timeLeft = modeSelected;
            timeVal.innerText = (timeLeft===9999)?"∞":timeLeft;
            if(timeLeft === 9999) document.getElementById('life-card').style.display = "none";
            else document.getElementById('life-card').style.display = "block";
            gameActive = true;
            resetGameEnvironment();
            startMenu.style.opacity = '0';
            setTimeout(() => startMenu.style.display = 'none', 500);
            document.getElementById('game-ui').style.visibility = 'visible';
            document.getElementById('control-panel').style.visibility = 'visible';
            document.getElementById('camera-wrapper').style.visibility = 'visible';
            document.getElementById('conveyor-belt').style.visibility = 'visible';
            dogContainer.style.visibility = 'visible';
            document.getElementById('pointer-0').style.display = 'block';
            document.getElementById('pointer-1').style.display = 'block';
            startTimerClock();
            startMediaPipeCamera();
        }
        
        function startTimerClock() {
            const clock = setInterval(() => {
                if (!gameActive || timeLeft === 9999) return;
                timeLeft--; timeVal.innerText = timeLeft;
                if (timeLeft <= 0) { gameActive = false; clearInterval(clock); alert(`🎉 游戏结束！最终得分: ${score} 分，最高连击: ${maxCombo}！`); }
            }, 1000);
        }
        
        function updateGameFrame() {
            if (!gameActive) { requestAnimationFrame(updateGameFrame); return; }
            for (let i = activeFoods.length-1; i>=0; i--) {
                const food = activeFoods[i];
                food.x -= food.speed;
                food.element.style.left = `${food.x}px`;
                if (food.x < -100) {
                    food.element.remove();
                    let maxX = window.innerWidth;
                    activeFoods.forEach(f => { if(f.x > maxX) maxX = f.x; });
                    activeFoods.splice(i,1);
                    appendSushiFood(maxX + currentConfigSpacing, Math.random()>0.5?10:45);
                }
            }
            dogX += dogSpeed * dogDirection;
            const limit = 160;
            if (dogX > window.innerWidth - limit) { dogDirection = -1; dogX = window.innerWidth - limit; }
            if (dogX < limit) { dogDirection = 1; dogX = limit; }
            dogContainer.style.left = `${dogX}px`;
            
            for(let i=flyingFoods.length-1; i>=0; i--) {
                const f = flyingFoods[i]; f.x += f.vx; f.y += f.vy; f.vy += 0.35;
                f.element.style.left = `${f.x}px`; f.element.style.top = `${f.y}px`;
                const dogRect = dogImg.getBoundingClientRect();
                if (f.x > dogRect.left && f.x < dogRect.right && f.y > dogRect.top && f.y < dogRect.bottom) {
                    handleFoodImpact(f.emoji, f.x, f.y); f.element.remove(); flyingFoods.splice(i,1); continue;
                }
                if(f.y > window.innerHeight+80) { f.element.remove(); flyingFoods.splice(i,1); }
            }
            requestAnimationFrame(updateGameFrame);
        }
        requestAnimationFrame(updateGameFrame);
        
        // ---------- MediaPipe 双手识别 ----------
        let handStates = [
            { isHolding: false, startX:0, startY:0, curX:0, curY:0, food:'', lostFrames:0 },
            { isHolding: false, startX:0, startY:0, curX:0, curY:0, food:'', lostFrames:0 }
        ];
        const maxLostFrames = 15;
        
        function startMediaPipeCamera() {
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands:2, modelComplexity:1, minDetectionConfidence:0.6, minTrackingConfidence:0.6 });
            hands.onResults(onResults);
            const camera = new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width:640, height:480 });
            camera.start();
        }
        
        function onResults(results) {
            if (!gameActive) return;
            const detectedHands = results.multiHandLandmarks || [];
            for(let hIdx=0; hIdx<2; hIdx++) {
                const state = handStates[hIdx];
                const ptrEl = document.getElementById(`pointer-${hIdx}`);
                const aimFoodEl = document.getElementById(`aiming-food-${hIdx}`);
                const aimLineEl = document.getElementById(`aim-line-${hIdx}`);
                const aimPathEl = document.getElementById(`aim-path-${hIdx}`);
                if(hIdx >= detectedHands.length) {
                    if(state.isHolding) { state.lostFrames++; if(state.lostFrames >= maxLostFrames) { state.isHolding=false; aimFoodEl.style.display='none'; aimLineEl.style.display='none'; } }
                    ptrEl.style.display='none'; continue;
                }
                state.lostFrames=0; ptrEl.style.display='block';
                const hand = detectedHands[hIdx];
                const pX = (1-hand[9].x)*window.innerWidth;
                const pY = hand[9].y*window.innerHeight;
                ptrEl.style.left=`${pX}px`; ptrEl.style.top=`${pY}px`;
                let bentFingers=0;
                if(hand[8].y>hand[6].y) bentFingers++;
                if(hand[12].y>hand[10].y) bentFingers++;
                if(hand[16].y>hand[14].y) bentFingers++;
                if(hand[20].y>hand[18].y) bentFingers++;
                const isFistGrip = bentFingers>=3;
                if(isFistGrip) {
                    ptrEl.innerText='✊';
                    if(!state.isHolding) {
                        for(let i=0;i<activeFoods.length;i++) {
                            const food=activeFoods[i];
                            const rect=food.element.getBoundingClientRect();
                            if(pX>rect.left && pX<rect.right && pY>rect.top && pY<rect.bottom) {
                                state.isHolding=true; state.food=food.emoji; state.startX=pX; state.startY=pY;
                                aimFoodEl.innerText=state.food; aimFoodEl.style.left=`${pX}px`; aimFoodEl.style.top=`${pY}px`;
                                aimFoodEl.style.display='block'; aimLineEl.style.display='block';
                                food.element.remove(); activeFoods.splice(i,1);
                                let maxX=window.innerWidth; activeFoods.forEach(f=>{if(f.x>maxX) maxX=f.x;});
                                appendSushiFood(maxX+currentConfigSpacing, Math.random()>0.5?10:45);
                                break;
                            }
                        }
                    } else {
                        state.curX=pX; state.curY=pY; aimFoodEl.style.left=`${pX}px`; aimFoodEl.style.top=`${pY}px`;
                        let vx=(state.startX-state.curX)*0.13; let vy=(state.startY-state.curY)*0.13;
                        let pathD=`M ${state.startX} ${state.startY}`; let tx=state.startX, ty=state.startY, tvy=vy;
                        for(let k=0;k<30;k++) { tx+=vx; ty+=tvy; tvy+=0.35; pathD+=` L ${tx} ${ty}`; }
                        aimPathEl.setAttribute('d',pathD);
                    }
                } else {
                    ptrEl.innerText='🐾';
                    if(state.isHolding) {
                        state.isHolding=false; aimFoodEl.style.display='none'; aimLineEl.style.display='none';
                        const vx=(state.startX-pX)*0.14; const vy=(state.startY-pY)*0.14;
                        if(Math.hypot(vx,vy)>=1.5) {
                            const flyEl=document.createElement('div'); flyEl.className='flying-food'; flyEl.innerText=state.food;
                            flyEl.style.left=`${state.startX}px`; flyEl.style.top=`${state.startY}px`; document.body.appendChild(flyEl);
                            flyingFoods.push({ element:flyEl, emoji:state.food, x:state.startX, y:state.startY, vx:vx, vy:vy });
                        }
                    }
                }
            }
        }
        
        document.addEventListener("keydown", (e) => {
            if(e.code === "Space" && gameActive) {
                e.preventDefault();
                activateSkill();
            }
        });
    </script>
</body>
</html>
